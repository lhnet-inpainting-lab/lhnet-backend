spring.application.name=deepfillv2-api

# Python 추론 서비스 주소
inference.base-url=http://localhost:8000

# 프론트엔드 개발 서버 CORS 허용
cors.allowed-origins=http://localhost:5173

# 업로드 이미지 크기 제한
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# 공개 API(v1) 키 목록 (콤마 구분) — 운영에서는 환경변수로 주입
api.keys=${API_KEYS:jium-demo-key}

# 관리자 콘솔 키
admin.key=${ADMIN_KEY:admin-demo-key}
